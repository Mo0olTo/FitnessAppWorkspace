<p-toast></p-toast>
<div class="relative min-h-screen dark:bg-[#232424]">
  <div
    class="absolute inset-0 bg-cover bg-center opacity-5"
    style="background-image: url('/images/auth-bg.webp')"
  ></div>

  <div class="container mx-auto pt-5 relative z-10">
    <div class="info flex items-center justify-evenly flex-wrap gap-6">
      @for (metrics of profileMetrics; track metrics.label) {
        <div class="p-2 text-[var(--color-main-text)]">
          <h3 class="text-center text-4xl font-extrabold">{{ metrics.label }}</h3>
          <p class="text-center text-xs opacity-60 mb-2">TAP TO CHANGE</p>

          <button
            class="flex justify-between items-center font-bold text-base bg-[#FF4100] w-[240px] py-2.5 px-4 rounded-3xl border border-[var(--color-borders)] hover:bg-[#e03a00] transition-colors"
          >
            {{ metrics.signal() }}
            <span class="font-bold text-base !text-[var(--color-main-text)]">
              <i class="pi pi-sync"></i>
            </span>
          </button>
        </div>
      }
    </div>

    <div
      class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6 max-w-4xl mx-auto pt-16 px-4 text-[var(--color-main-text)]"
    >
      @for (item of settingItems; track $index) {
        <div
          (click)="item.action?.()"
          class="flex flex-col items-center justify-center bg-white/[0.03] border border-white/10 rounded-2xl p-6 h-[170px] cursor-pointer transition-all duration-300 hover:bg-white/[0.07] hover:border-[#FF4100]/50 backdrop-blur-md"
          [class.md:col-start-2]="
            item.title?.toLowerCase() === 'logout' || $index === settingItems.length - 1
          "
        >
          <i [class]="item.icon" class="text-2xl text-[#FF4100] mb-4"></i>

          <span
            class="text-base font-semibold tracking-wide"
            [class.text-[#FF4100]]="item.title?.toLowerCase() === 'logout'"
          >
            {{ item.title }}
          </span>

          @if (item.subtitle) {
            <span class="text-sm opacity-60 mt-1">({{ item.subtitle }})</span>
          }

          @if (item.hasToggle) {
            <div class="mt-3 flex items-center">
              <div
                class="w-10 h-5 bg-[#FF4100] rounded-full p-0.5 cursor-pointer flex items-center justify-end"
              >
                <div class="bg-white w-4 h-4 rounded-full shadow"></div>
              </div>
            </div>
          }
        </div>
      }
    </div>
  </div>
</div>

<div class="card flex justify-center">
  <p-dialog
    [visible]="visible()"
    (visibleChange)="visible.set($event)"
    [modal]="true"
    maskStyleClass="backdrop-blur-sm"
    styleClass="!border-0 !bg-transparent"
    [draggable]="false"
    [resizable]="false"
  >
    <ng-template #headless>
      <form
        [formGroup]="changePasswordForm"
        (ngSubmit)="onSubmit()"
        class="flex flex-col px-8 py-8 gap-6 rounded-2xl border border-white/10 dark:bg-[#232424] shadow-2xl"
        style="width: 380px"
      >
        <svg width="31" height="33">...</svg>

        <h3 class="text-center text-xl font-bold text-[var(--color-main-text)] -mt-2">
          Change Password
        </h3>

        <div class="inline-flex flex-col gap-2">
          <label for="currentPassword" class="text-white/80 text-sm font-semibold"
            >Current Password</label
          >
          <app-reusable-input
            [value]="changePasswordForm.get('password')?.value || ''"
            (blur)="changePasswordForm.get('password')?.markAsTouched()"
            (valueChange)="
              changePasswordForm.get('password')?.setValue($event);
              changePasswordForm.get('password')?.markAsDirty()
            "
            [type]="'password'"
            [placeholder]="
              'Current Password
'
            "
          />
        </div>
        <div class="inline-flex flex-col gap-2">
          <label for="newPassword" class="text-white/80 text-sm font-semibold">New Password</label>
          <app-reusable-input
            [value]="newPasswordControl?.value || ''"
            (valueChange)="newPasswordControl?.setValue($event); newPasswordControl?.markAsDirty()"
            (blur)="newPasswordControl?.markAsTouched()"
            [type]="'password'"
            [placeholder]="'New Password'"
          />
        </div>

        <div class="flex items-center gap-4 mt-2">
          <p-button
            label="Cancel"
            type="button"
            (click)="closeDialog()"
            [text]="true"
            styleClass="!p-3 w-full !text-white/70 !border !border-white/20 hover:!bg-white/5 !rounded-xl"
            class="w-full"
          />
          <p-button
            label="Update"
            type="submit"
            [disabled]="changePasswordForm.invalid"
            styleClass="!p-3 w-full !bg-[#FF4100] !text-white !border-0 hover:!bg-[#e03a00] !rounded-xl font-bold shadow-lg shadow-[#FF4100]/20 disabled:opacity-50"
            class="w-full"
          />
        </div>
      </form>
    </ng-template>
  </p-dialog>
</div>
