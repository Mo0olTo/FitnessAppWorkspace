<button
  [disabled]="disabled()"
  class="text-[var(--color-main-text)] rounded-3xl py-2 w-90"
  [class]="
    disabled()
      ? 'text-[var(--color-main-text)] bg-[#D3D3D3] cursor-not-allowed'
      : 'bg-[var(--color-primary)] cursor-pointer '
  "
>
  <h1 class="text-xl capitalize font-[600]">
    {{ btnTitle() }}
  </h1>
</button>
