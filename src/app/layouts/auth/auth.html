<div
  class="relative flex min-h-[100dvh] flex-col bg-[#0a0a0a] lg:flex-row " 
>
  <div
    class="pointer-events-none absolute inset-0 bg-cover bg-center opacity-45 [background-image:url('/images/auth-bg.webp')]"
    aria-hidden="true"
  ></div>
  <div
    class="pointer-events-none absolute inset-0 bg-gradient-to-br from-black/85 via-[#121212]/92 to-black/95"
    aria-hidden="true"
  ></div>

  <aside
    class="relative z-10 flex flex-1 flex-col items-center justify-between gap-6 px-6 py-8 lg:max-w-[50%] lg:justify-center lg:gap-10 lg:px-10 lg:py-14 xl:px-16"
  >
    <div class="flex shrink-0 flex-col items-center pt-2">
      <img
        src="/images/auth-logo.webp"
        width="360"
        height="140"
        fetchpriority="high"
        alt="Super Fitness"
        class="h-auto w-[min(280px,78vw)] select-none object-contain drop-shadow-lg lg:w-[min(320px,32vw)]"
      />
    </div>

    <div
      class="relative flex w-full max-w-xl flex-1 items-end justify-center lg:flex-1 lg:items-center"
    >
      <img
        src="/images/auth-layout.webp"
        width="900"
        height="700"
        alt=""
        loading="lazy"
        decoding="async"
        class="max-h-[min(42vh,420px)] w-auto object-contain object-bottom [filter:drop-shadow(0_24px_48px_rgba(0,0,0,0.55))] lg:max-h-none lg:max-w-full lg:object-center"
      />
    </div>
  </aside>

  <main
    class="relative z-10 flex flex-1 flex-col justify-center px-5 pb-10 pt-4 lg:max-w-[50%] lg:px-12 lg:py-16 xl:px-20"
  >
    <router-outlet />
  </main>
</div>
