<div
  class="relative isolate flex min-h-[100dvh] flex-col overflow-hidden bg-[var(--auth-page-bg)] text-[var(--color-main-text)] lg:h-[100dvh] lg:min-h-0 lg:flex-row"
>
  <div
    class="pointer-events-none absolute inset-0 scale-110 bg-cover bg-center blur-[14px] [background-image:url('/images/auth-bg.webp')]"
    aria-hidden="true"
  ></div>
  <div
    class="pointer-events-none absolute inset-0 bg-[color:var(--auth-overlay)] backdrop-blur-[var(--blur)]"
    aria-hidden="true"
  ></div>
  <div
    class="pointer-events-none absolute -left-24 top-16 h-64 w-64 rounded-full bg-[var(--auth-glow-left)] blur-3xl sm:h-80 sm:w-80"
    aria-hidden="true"
  ></div>
  <div
    class="pointer-events-none absolute right-[-3rem] top-[-2rem] h-56 w-56 rounded-full bg-[var(--auth-glow-right)] blur-3xl sm:h-72 sm:w-72"
    aria-hidden="true"
  ></div>
  <div
    class="pointer-events-none absolute bottom-[-5rem] left-1/2 h-72 w-72 -translate-x-1/2 rounded-full bg-[var(--auth-glow-bottom)] blur-3xl "
    aria-hidden="true"
  ></div>
  <div
    class="pointer-events-none absolute inset-y-0 left-1/2 z-[2] hidden w-px -translate-x-1/2 bg-[linear-gradient(to_bottom,transparent,var(--auth-center-divider),transparent)] shadow-[0_0_12px_var(--auth-center-divider)] lg:block"
    aria-hidden="true"
  ></div>

  <aside
    class="relative z-10 flex flex-1 flex-col items-center justify-center  px-6 py-8 lg:min-h-0 lg:max-w-[50%]   lg:px-10 lg:py-8 xl:px-16"
  >
    <div class="flex shrink-0 flex-col items-center pt-2">
      <img
        src="/images/auth-logo.webp"
        width="360"
        height="140"
        fetchpriority="high"
        alt="Super Fitness"
        class="h-auto w-[min(280px,78vw)] select-none object-contain drop-shadow-lg lg:w-[min(320px,32vw)]"
      />
    </div>

    <div
      class="relative flex w-full max-w-xl flex-1 items-end justify-center lg:min-h-0 lg:flex-1 lg:items-center"
    >
      <img
        src="/images/auth-layout.webp"
        width="900"
        height="700"
        alt=""
        loading="lazy"
        decoding="async"
        class="max-h-[min(42vh,420px)] w-auto object-contain object-bottom [filter:drop-shadow(0_24px_48px_rgba(0,0,0,0.55))] lg:max-h-[66vh] lg:max-w-full lg:object-center"
      />
    </div>
  </aside>

  <main
    class="relative z-10 flex flex-1 flex-col justify-center px-4 pb-10 pt-4 sm:px-5 lg:min-h-0 lg:max-w-[50%] lg:px-12 lg:py-8 xl:px-20"
  >
    <!-- <router-outlet /> -->
  </main>
</div>
