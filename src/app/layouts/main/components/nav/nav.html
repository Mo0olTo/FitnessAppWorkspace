<header class=" relative px-4">
  <div class="container mx-auto flex justify-between items-center text-[var(--color-main-text)]">
    <div class="logo">
      <img
        ngSrc="/images/logo.png"
        width="100"
        height="50"
        priority
        alt="FitnessAppLogo"
        class="w-32 h-auto"
      />
    </div>

    <nav class="hidden md:block">
      <ul class="flex gap-[24px]">
        <li>
          <a routerLink="home" [routerLinkActive]="'active-link'" class="nav">Home</a>
        </li>
        <li>
          <a routerLink="about" [routerLinkActive]="'active-link'" class="nav">About</a>
        </li>
        <li>
          <a routerLink="classes" [routerLinkActive]="'active-link'" class="nav">Classes</a>
        </li>
        <li>
          <a routerLink="healthy" [routerLinkActive]="'active-link'" class="nav">Healthy</a>
        </li>
      </ul>
    </nav>

    <div class="flex items-center gap-8">
      @if (_auth.isLogged()) {
        <div
          (click)="goToProfile()"
          class="w-12 h-12 rounded-full bg-[var(--color-primary)] cursor-pointer flex items-center justify-center text-white shadow-lg"
        >
          <i class="pi pi pi-user"></i>
        </div>
      } @else {
        <div class="hidden md:flex gap-8 cursor-pointer">
          <app-custom-button
            width="77px"
            title="Login"
            customBg="--color-primary"
            color="white"
            icon="pi pi-arrow-up-right"
            (btnClick)="goToLogin()"
          ></app-custom-button>
          <app-custom-button
            width="85px"
            title="Signup"
            border="2px solid red"
            colorBtn="--color-primary"
            icon="pi pi-arrow-up-right"
            (btnClick)="goToRegister()"
          ></app-custom-button>
        </div>
      }

      <button
        (click)="toggleMenu()"
        class="md:hidden w-12 h-12 bg-[var(--color-primary)] rounded-full flex items-center justify-center text-white text-2xl shadow-lg active:scale-95 transition-all"
      >
        @if (!isMenuOpen()) {
          <svg
            width="18"
            height="14"
            viewBox="0 0 18 14"
            fill="none"
            xmlns="http://www.w3.org/2000/svg"
          >
            <path
              d="M1 1H17M4 7H17M7 13H17"
              stroke="white"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
        } @else {
          <i class="pi pi-times" style="font-size: 1.5rem"></i>
        }
      </button>
    </div>

    @if (isMenuOpen()) {
      <div
        class="md:hidden dark:bg-[#232424]/75 absolute top-0 left-4 w-64 bg-[var(--color-main-text)] p-6 rounded-lg shadow-2xl z-50 animate-in fade-in slide-in-from-left-5 duration-300"
      >
        <div class="mb-8 border-b border-gray-700 pb-4">
          <img ngSrc="/images/logo.png" width="80" height="40" alt="Logo" class="w-20 h-auto" />
        </div>

        <ul class="flex flex-col gap-5 mb-8">
          <li>
            <a
              routerLink="home"
              [routerLinkActive]="'active-link'"
              (click)="isMenuOpen.set(false)"
              class="text-white nav text-lg block"
              >Home</a
            >
          </li>
          <li>
            <a
              routerLink="about"
              [routerLinkActive]="'active-link'"
              (click)="isMenuOpen.set(false)"
              class="text-white nav text-lg block"
              >About</a
            >
          </li>
          <li>
            <a
              routerLink="classes"
              [routerLinkActive]="'active-link'"
              (click)="isMenuOpen.set(false)"
              class="text-white nav text-lg block"
              >Classes</a
            >
          </li>
          <li>
            <a
              routerLink="healthy"
              [routerLinkActive]="'active-link'"
              (click)="isMenuOpen.set(false)"
              class="text-white nav text-lg block"
              >Healthy</a
            >
          </li>
        </ul>

        <div class="flex flex-col p-5 gap-4">
          @if (_auth.isLogged()) {
            <div
              (click)="goToProfile()"
              class="w-12 h-12 rounded-full bg-[var(--color-primary)] cursor-pointer flex items-center justify-center text-white shadow-lg"
            >
              <i class="pi pi pi-user"></i>
            </div>
          } @else {
            <app-custom-button
              width="100%"
              title="Login"
              customBg="--color-primary"
              color="white"
            ></app-custom-button>
            <app-custom-button
              width="100%"
              title="Signup"
              border="2px solid red"
              colorBtn="--color-primary"
            ></app-custom-button>
          }
        </div>
      </div>
    }
  </div>
</header>
