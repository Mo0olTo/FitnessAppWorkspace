<button
  [style.background-color]="'var(' + customBg() + ')'"
  [style.color]="color()"
  [style.color]="'var(' + colorBtn() + ')'"
  [style.width]="width()"
  [style.border]="border()"
  [routerLink]="router()"
  class="custom-btn cursor-pointer"
>
  <span class="label">{{ title() }}</span>

  <span class="icon-wrapper">
    <i class="pi pi-arrow-up-right text-white"></i>
  </span>
</button>
