<section>
   <div class=" cursor-pointer"
   (click)="onPreview(videoUrl())"
   [class]="active() ? 'flex flex-col border-2 border-[var(--color-primary)] bg-[var(--color-primary)] rounded-2xl' : 'flex flex-col'">
    <div class="flex justify-evenly items-center w-full px-3 py-4  ">
        <!-- img part  -->
        <div class="w-1/3 flex items-center justify-center">
            <img [src]="image()" [alt]="alt()" class="w-[81px] h-[88px] rounded-[20px] object-cover">
        </div>

        <div class=" w-2/3 flex flex-col justify-center items-start">
         <!-- title -->
        <div class="w-full flex items-center justify-start ">
            <h2 class="font-medium text-lg text-[var(--color-main-text)]">{{title()}}</h2>
            
        </div>
        <!-- metadata and button -->
        <div class="w-full flex justify-between items-center">

            <div class="w-3/4 flex flex-col items-start justify-center">
                <p class="font-normal text-sm text-[var(--color-main-text)] ">{{metaData()}}</p>
            </div>
            <div class="w-1/4 flex flex-col items-end justify-center">
               @if (showPlayButton()) {

                <button 
                    
                (click)="onPlayButton($event)"
                [class]="active() ? ' bg-white hover:text-[var(--color-primary)] hover:bg-[#353737]' : ''"
                class="cursor-pointer  font-normal text-xl text-[var(--color-main-text) 
                 bg-[var(--color-primary)]  rounded-full w-[30px] h-[30px] flex justify-center items-center ">
                ▶
               </button>
               }
            </div>
            </div>
        </div>
    </div> 

    <div class="line flex justify-center items-center "></div>
   </div>
</section>
