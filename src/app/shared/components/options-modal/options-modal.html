<div
  class="fixed inset-0 bg-black/60 flex items-center justify-center z-50"
  (click)="onClose.emit()"
>
  <div
    class="bg-[#1e1e1e] rounded-2xl p-8 w-[340px] border border-[#333]"
    (click)="$event.stopPropagation()"
  >
    <!-- Header -->
    <div class="text-center mb-4">
      <h1 class="text-3xl font-black text-white mb-2">{{ title() }}</h1>
      <p class="text-sm text-[#aaa]">This Helps Us Create Your Personalized Plan</p>
    </div>

    <!-- Options -->
    <div class="flex flex-col gap-3 mb-6">
      @for (option of options(); track option) {
        <div
          class="flex items-center justify-between px-4 py-3 rounded-lg border cursor-pointer transition-all"
          [class]="
            selectedOption() === option
              ? 'border-orange-600 text-orange-500 bg-[#2a2a2a]'
              : 'border-[#444] text-[#ccc] bg-[#2a2a2a]'
          "
          (click)="selectOption(option)"
        >
          <span class="text-sm">{{ option }}</span>

          <div
            class="w-[18px] h-[18px] rounded-full border-2 flex items-center justify-center"
            [class]="
              selectedOption() === option
                ? 'border-orange-600 bg-orange-600 shadow-[inset_0_0_0_3px_#1e1e1e]'
                : 'border-[#888]'
            "
          ></div>
        </div>
      }
    </div>

    <!-- Next Button -->
    <button
      (click)="onSelect.emit(selectedOption())"
      [disabled]="!selectedOption()"
      class="w-full py-3 rounded-full bg-orange-600 text-white font-bold text-base cursor-pointer"
    >
      Next
    </button>
  </div>
</div>
